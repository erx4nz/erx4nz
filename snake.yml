name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"   # her gün gece yarısı otomatik yeniler
  workflow_dispatch:        # Actions sekmesinden manuel de çalıştırılabilir
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake (dracula colors)
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: erx4nz
          outputs: |
            dist/snake-dracula.svg?color_snake=%2350fa7b&color_dots=%23282a36,%2344475a,%236272a4,%23bd93f9,%23ff79c6

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
